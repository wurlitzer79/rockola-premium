    <style>
        :root {
            --primary: #e50914;
            --bg: #050505;
            --sidebar-bg: #101010;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px; height: 100vh; background: var(--sidebar-bg);
            position: fixed; left: 0; top: 0; display: flex; flex-direction: column;
            border-right: 1px solid #222; overflow-y: auto; z-index: 10;
        }
        .logo { padding: 30px; font-size: 24px; font-weight: 900; color: var(--primary); text-align: center; }
        
        .categoria-item {
            padding: 18px 25px; cursor: pointer; color: #888; transition: 0.3s;
            display: flex; align-items: center; 
            justify-content: space-between; /* ALINEACIÓN: Nombre Izq - Número Der */
            font-size: 17px;
        }
        
        .cat-info { display: flex; align-items: center; gap: 12px; }

        .peli-count { 
            font-size: 14px; 
            background: rgba(255,255,255,0.05); 
            padding: 2px 10px; 
            border-radius: 12px; 
            color: #555;
        }

        .categoria-item:hover, .categoria-item.activa {
            color: #fff; background: rgba(225, 9, 20, 0.1); border-left: 5px solid var(--primary);
        }
        .categoria-item:hover .peli-count, .categoria-item.activa .peli-count {
            color: var(--primary); background: rgba(225, 9, 20, 0.2);
        }

        /* --- MAIN --- */
        .main-content { margin-left: 300px; flex-grow: 1; padding: 40px; height: 100vh; overflow-y: auto; }
        .rejilla { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .peli-card { 
            background: #1a1a1a; border-radius: 10px; overflow: hidden; 
            cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .peli-card:hover { transform: scale(1.05); border-color: var(--primary); }
        .peli-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

        /* --- REPRODUCTOR --- */
        .reproductor-wrap {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; justify-content: center; align-items: center;
        }
        #video-element { width: 100%; height: 100%; object-fit: contain; }

        .ui-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.6) 100%);
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none;
        }
        .reproductor-wrap.show-ui .ui-overlay { opacity: 1; pointer-events: auto; }

        .btn-x {
            position: absolute; top: 40px; right: 50px;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.4);
            color: white; width: 70px; height: 70px; border-radius: 50%;
            font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .bottom-controls-bar { position: absolute; bottom: 40px; left: 50px; right: 50px; }
        .btn-play-pause { background: none; border: none; color: white; font-size: 60px; cursor: pointer; }
        .seek-bar { width: 100%; height: 10px; accent-color: var(--primary); cursor: pointer; }

        #status-msg {
            position: absolute; background: rgba(0,0,0,0.8); padding: 20px 40px;
            border-radius: 10px; border: 2px solid var(--primary); color: white;
            font-size: 20px; text-align: center; display: none; z-index: 10000;
        }
        .fa-spin { margin-bottom: 15px; display: block; font-size: 40px; color: var(--primary); }

        @media (max-width: 1024px) {
            .sidebar { width: 85px; }
            .sidebar span, .logo, .peli-count { display: none; }
            .main-content { margin-left: 85px; }
        }
    </style>
</head>

			url: 'https://archive.org/download/dbz-la-fusion-de-goku-y-vegeta/DBZ%20-%20La%20Fusion%20De%20Goku%20y%20Vegeta.mp4'
		  }
		];

        const grid = document.getElementById('peli-grid');
        const menu = document.getElementById('menu-cats');
        const playerBox = document.getElementById('player-box');
        const video = document.getElementById('video-element');
        const statusMsg = document.getElementById('status-msg');
        let uiTimer;
        let isError = false;

        // 1. GENERAR CATEGORÍAS CON CONTADOR
        const categorias = ['Todos', ...new Set(movies.map(m => m.cat))];
        
        categorias.forEach(c => {
            // Calcular cantidad
            const cantidad = c === 'Todos' ? movies.length : movies.filter(m => m.cat === c).length;

            const li = document.createElement('li');
            li.className = `categoria-item ${c === 'Todos' ? 'activa' : ''}`;
            li.innerHTML = `
                <div class="cat-info">
                    <i class="fas fa-film"></i> 
                    <span>${c}</span>
                </div>
                <span class="peli-count">${cantidad}</span>
            `;
            li.onclick = () => {
                document.querySelectorAll('.categoria-item').forEach(i => i.classList.remove('activa'));
                li.classList.add('activa');
                mostrarPelis(c);
            };
            menu.appendChild(li);
        });

        function mostrarPelis(cat) {
            document.getElementById('seccion-txt').innerText = cat;
            const filtradas = cat === 'Todos' ? movies : movies.filter(m => m.cat === cat);
            grid.innerHTML = filtradas.map(p => `
                <div class="peli-card" onclick="lanzarPeli('${p.url}', '${p.title}')">
                    <img src="${p.thumb}" loading="lazy">
                    <div style="padding:15px; text-align:center; font-size:14px;">${p.title}</div>
                </div>
            `).join('');
        }

        // 2. LANZAR PELI CON TÍTULO FILTRADO (SOLO HASTA ANTES DEL <BR>)
        function lanzarPeli(url, titulo) {
            isError = false;
            video.src = url;
            
            // FILTRO DE TÍTULO SOLICITADO
            document.getElementById('peli-title-display').innerText = titulo.split('<br>')[0].trim();
            
            playerBox.style.display = 'flex';
            statusMsg.style.display = 'block';
            document.getElementById('txt-status').innerText = "Conectando...";
            video.load();
            resetUI();
        }

        // EVENTOS VIDEO
        video.oncanplay = () => { statusMsg.style.display = 'none'; video.play(); };
        video.onerror = () => {
            isError = true;
            statusMsg.style.display = 'block';
            document.getElementById('icon-status').className = "fas fa-exclamation-triangle";
            document.getElementById('txt-status').innerHTML = "ARCHIVO NO DISPONIBLE";
            playerBox.classList.add('show-ui');
        };

        function resetUI() {
            if(isError) return;
            playerBox.classList.add('show-ui');
            clearTimeout(uiTimer);
            uiTimer = setTimeout(() => { if (!video.paused) playerBox.classList.remove('show-ui'); }, 4000);
        }

        playerBox.onmousemove = resetUI;
        document.getElementById('close-peli').onclick = () => {
            video.pause(); video.src = "";
            playerBox.style.display = 'none';
            statusMsg.style.display = 'none';
        };

        const btnPlay = document.getElementById('master-play');
        btnPlay.onclick = () => {
            if (video.paused) { video.play(); btnPlay.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { video.pause(); btnPlay.innerHTML = '<i class="fas fa-play"></i>'; playerBox.classList.add('show-ui'); clearTimeout(uiTimer); }
        };

        video.ontimeupdate = () => { document.getElementById('seek-bar').value = (video.currentTime / video.duration) * 100; };
        document.getElementById('seek-bar').oninput = function() { video.currentTime = (this.value * video.duration) / 100; };

        mostrarPelis('Todos');
    </script>
</body>
</html>
