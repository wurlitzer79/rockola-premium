<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockola Premium 2026</title>	
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
	<link rel="stylesheet" href="styles7.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo-container">Rockola Premium</div>
        <p class="menu-titulo">Categorías</p>
        <ul class="lista-categorias" id="menu-categorias">
            </ul>
    </nav>

    <main class="main-content">
        <h1 id="titulo-seccion">Todas las películas</h1>
        <div class="rejilla-peliculas" id="contenedor-peliculas">
            </div>
    </main>

    <div class="reproductor" id="reproductor">
        <video id="video-player"></video>
        
        <div class="ui-video" id="ui-video">
            <button class="btn-cerrar" id="btn-cerrar"><i class="fas fa-times"></i></button>
            
            <div class="controles-inferiores">
                <input type="range" class="barra-progreso" id="progreso" value="0">
                <div class="botones-flex">
                    <button id="btn-play"><i class="fas fa-play"></i></button>
                    <button id="btn-vol"><i class="fas fa-volume-up"></i></button>
                    <button id="btn-fs"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>
    </div>

	<script src="script7.js"></script>

</body>
</html>
