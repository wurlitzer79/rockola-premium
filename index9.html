<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockola Premium 2026</title>	
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
	<link rel="stylesheet" href="styles9.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">Rockola Premium 2026</div>
        <ul id="menu-cats"></ul>
    </nav>

    <main class="main-content">
        <h1 id="seccion-txt" style="margin-bottom: 30px;">Catálogo</h1>
        <div class="rejilla" id="peli-grid"></div>
    </main>

    <div class="reproductor-wrap" id="player-box">
        <video id="video-element"></video>
        
        <div class="ui-overlay">
            <button class="btn-x" id="close-peli" title="Cerrar"><i class="fas fa-times"></i></button>
            
            <div class="controles-bottom">
                <input type="range" class="progress-bar" id="seek-bar" value="0">
                <button class="play-trigger" id="master-play"><i class="fas fa-pause"></i></button>
            </div>
        </div>
    </div>

    <script src="script9.js"></script>

</body>
</html>
